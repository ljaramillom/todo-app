version: '3.9'

services:
  # ====================== BACKEND (Spring Boot) ======================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Variables del .env en la raíz (misma carpeta que este compose); rutas relativas al archivo compose.
    env_file:
      - .env
    environment:
      # Solo lo que debe imponerse al contenedor (no suele ir en .env de app)
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  # ====================== FRONTEND (Angular + Nginx) ======================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080}
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-4200}:80"

  # ====================== POSTGRESQL ======================
  db:
    image: postgres:18-alpine
    container_name: todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local