<dialog class="modal" [class.modal-open]="open()">
  <div class="modal-box w-11/12 max-h-[min(90dvh,52rem)] max-w-3xl overflow-y-auto overscroll-contain">
    <div class="mb-4 flex items-center justify-between gap-3">
      <h3 class="text-lg font-bold">{{ modalTitle() }}</h3>
      <button type="button" class="btn btn-sm btn-circle btn-ghost" (click)="closeForm()">✕</button>
    </div>

    @if (submitError()) {
      <div class="alert alert-error mb-4 text-sm">
        <span>{{ submitError() }}</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <label class="flex w-full min-w-0 flex-col gap-1 md:col-span-2">
          <span class="text-sm font-medium">Titulo *</span>
          <input
            type="text"
            class="input input-bordered w-full max-w-full"
            formControlName="title"
            maxlength="255"
            placeholder="Ej. Preparar entrega semanal"
          />
          @if (form.controls.title.touched && form.controls.title.invalid) {
            <span class="text-xs text-error">
              El titulo es obligatorio y debe tener maximo 255 caracteres.
            </span>
          }
        </label>

        <label class="flex w-full min-w-0 flex-col gap-1 md:col-span-2">
          <span class="text-sm font-medium">Descripcion</span>
          <textarea
            class="textarea textarea-bordered min-h-24 w-full min-w-0 max-w-full resize-y"
            formControlName="description"
            maxlength="4000"
            placeholder="Describe el contexto de la tarea..."
          ></textarea>
        </label>

        <label class="flex w-full min-w-0 flex-col gap-1">
          <span class="text-sm font-medium">Fecha de ejecucion *</span>
          <input type="datetime-local" class="input input-bordered w-full max-w-full" formControlName="executionDate" />
          @if (form.controls.executionDate.touched && form.controls.executionDate.invalid) {
            <span class="text-xs text-error">La fecha de ejecucion es obligatoria.</span>
          }
        </label>

        <label class="flex w-full min-w-0 flex-col gap-1">
          <span class="text-sm font-medium">Estado *</span>
          <select class="select select-bordered w-full max-w-full" formControlName="status">
            @for (option of statusOptions; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        </label>
      </div>

      @defer (on idle) {
        <section class="rounded-box border border-base-300 bg-base-200/40 p-3 sm:p-4">
          <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
            <h4 class="text-sm font-semibold uppercase tracking-wide text-base-content/70">
              Subtareas dinamicas
            </h4>
            <button
              type="button"
              class="btn btn-sm btn-soft btn-primary w-full shrink-0 sm:w-auto"
              (click)="addSubtask()"
            >
              + Agregar subtarea
            </button>
          </div>

          <div formArrayName="subtasks" class="space-y-2">
            @for (subtaskGroup of subtasks.controls; track trackBySubtaskIndex($index)) {
              <div
                class="flex min-w-0 items-start gap-2 rounded-box border border-base-300 bg-base-100 px-2 py-2 sm:gap-3 sm:px-3 sm:py-2"
              >
                <input
                  type="checkbox"
                  class="checkbox checkbox-sm mt-1.5 shrink-0 sm:mt-2"
                  [formControl]="subtaskGroup.controls.completed"
                  aria-label="Marcar subtarea como completada"
                />

                <label class="flex min-w-0 flex-1 flex-col gap-0.5">
                  <input
                    type="text"
                    class="input input-bordered input-sm w-full max-w-full"
                    [formControl]="subtaskGroup.controls.description"
                    maxlength="2000"
                    placeholder="Descripcion de la subtarea"
                  />
                  @if (subtaskGroup.controls.description.touched && subtaskGroup.controls.description.invalid) {
                    <span class="text-xs leading-snug text-error">
                      La descripcion es obligatoria (maximo 2000 caracteres).
                    </span>
                  }
                </label>

                <button
                  type="button"
                  class="btn btn-square btn-sm btn-ghost mt-1 shrink-0 text-error hover:bg-error/10 sm:mt-1.5"
                  (click)="removeSubtask($index)"
                  aria-label="Eliminar subtarea"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    class="size-5"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                    />
                  </svg>
                </button>
              </div>
            } @empty {
              <p class="text-sm text-base-content/70">
                No hay subtareas. Puedes guardar sin subtareas o agregar nuevas.
              </p>
            }
          </div>
        </section>
      } @placeholder {
        <div class="space-y-2">
          <div class="skeleton h-10 w-full"></div>
          <div class="skeleton h-10 w-full"></div>
        </div>
      }

      <div class="modal-action mt-2">
        <button type="button" class="btn btn-ghost" (click)="closeForm()" [disabled]="submitting()">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="!canSubmit()">
          @if (submitting()) {
            <span class="loading loading-spinner loading-xs"></span>
          }
          {{ isEditMode() ? 'Guardar cambios' : 'Crear tarea' }}
        </button>
      </div>
    </form>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="closeForm()">close</button>
  </form>
</dialog>
