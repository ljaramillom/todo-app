<dialog class="modal z-[2000]" [class.modal-open]="open()">
  <div class="modal-box w-11/12 max-w-lg">
    <div class="mb-4 flex items-center justify-between gap-3">
      <h3 class="text-lg font-bold">{{ title() }}</h3>
      <button type="button" class="btn btn-sm btn-circle btn-ghost" (click)="onDismiss()" aria-label="Cerrar">
        ✕
      </button>
    </div>

    <p class="text-sm text-base-content/80">{{ message() }}</p>

    <div class="modal-action mt-6">
      <button type="button" class="btn btn-ghost" (click)="onDismiss()">{{ cancelLabel() }}</button>
      <button
        type="button"
        class="btn"
        [class.btn-error]="confirmDanger()"
        [class.text-white]="confirmDanger()"
        [class.btn-primary]="!confirmDanger()"
        (click)="onConfirm()"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button type="button" (click)="onDismiss()">close</button>
  </form>
</dialog>
